name: Build & Release APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Proper update: Use the existing 8.5 wrapper to upgrade to 8.7
      - name: Update Gradle Wrapper to 8.7
        run: |
          chmod +x gradlew
          ./gradlew wrapper --gradle-version 8.7

      # This pushes the 8.7 files back to your repo automatically
      - name: Commit and Push Wrapper Update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-fix: Updated Gradle Wrapper to 8.7"
          file_pattern: 'gradlew gradlew.bat gradle/*'

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get version name
        id: version
        run: |
          # Fallback to 1.0 if the task doesn't exist yet
          VERSION=$(./gradlew -q printVersionName 2>/dev/null || echo "1.0")
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=Flash v${VERSION} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: Create Release & upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            Debug build from commit ${{ github.sha }}
            
            **Install:** enable *Install unknown apps* on your device, download the APK below and open it.
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true