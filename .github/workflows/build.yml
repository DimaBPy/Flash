name: Build & Release APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get version name
        id: version
        if: github.event_name == 'push'
        run: |
          VERSION=$(./gradlew -q printVersionName --no-daemon)
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=Flash v${VERSION} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: Create Release & upload APK
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            Debug build from commit ${{ github.sha }}

            **Install:** enable *Install unknown apps* on your device, download the APK below and open it.
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: ${{ github.ref == 'refs/heads/main' }}
