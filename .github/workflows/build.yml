name: Build & Release APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial: Allows the bot to push files back!

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. Generate the wrapper files if they aren't there
      - name: Generate Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi

      # 2. Push those files back to your repo so it's fixed forever
      - name: Commit and Push Wrapper
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-fix: Added missing Gradle Wrapper files"
          file_pattern: 'gradlew gradlew.bat gradle/*'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get version name
        id: version
        run: |
          VERSION=$(./gradlew -q printVersionName 2>/dev/null || echo "1.0")
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=Flash v${VERSION} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: Create Release & upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: |
            Debug build from commit ${{ github.sha }}
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
